---
- hosts: localhost
  connection: local

  tasks:

    - name: Install monitoring tools
      apt:
        name:
          - htop
          - tree
          - curl
          - wget
        state: present
      become: yes

    - name: Verify htop installation
      command: which htop
      register: htop_result

    - debug:
        var: htop_result.stdout
